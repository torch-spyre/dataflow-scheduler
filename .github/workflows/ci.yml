name: CI

# Tracks torch-spyre/dataflow-scheduler#10

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      artifact-repo:
        description: "GitHub repo (owner/repo) to fetch the LLVM artifact from. Defaults to torch-spyre/ktir-mlir-frontend."
        required: false
        type: string

jobs:
  test:
    name: Test (${{ matrix.config.name }})
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Clang 21", cc: "clang-21", cxx: "clang++-21" }
          - { name: "GCC 13",   cc: "gcc-13",   cxx: "g++-13" }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve artifact repo
        id: config
        run: |
          ARTIFACT_REPO="${{ inputs.artifact-repo || 'torch-spyre/ktir-mlir-frontend' }}"
          echo "artifact-repo=${ARTIFACT_REPO}" >> $GITHUB_OUTPUT

      - name: Read LLVM hash
        id: llvm
        run: |
          echo "hash=$(cat external/ktir-mlir-frontend/cmake/llvm-hash.txt)" >> $GITHUB_OUTPUT

      - name: Cache MLIR
        uses: actions/cache@v4
        with:
          path: ~/.cache/ktir-mlir
          key: mlir-static-${{ steps.llvm.outputs.hash }}

      - name: Download MLIR
        run: |
          MLIR_DIR=$(python3 external/ktir-mlir-frontend/scripts/setup_mlir.py \
            --hash "${{ steps.llvm.outputs.hash }}" \
            --repo ${{ steps.config.outputs.artifact-repo }})
          echo "MLIR_DIR=$MLIR_DIR" >> $GITHUB_ENV

      - name: Read LLVM major version
        id: llvm-version
        run: |
          LLVM_CONFIG="${{ env.MLIR_DIR }}/../llvm/LLVMConfig.cmake"
          MAJOR=$(grep -m1 'set(LLVM_VERSION_MAJOR' "$LLVM_CONFIG" | grep -oP '\d+')
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          LLVM_MAJOR="${{ steps.llvm-version.outputs.major }}"

          # clang-format-${LLVM_MAJOR} from the LLVM apt repository
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          sudo add-apt-repository \
            "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-${LLVM_MAJOR} main"

          # clang-21 from the LLVM apt repository
          sudo add-apt-repository \
            "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-21 main"

          # gcc-13 from toolchain PPA
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test
          sudo apt-get update -q
          sudo apt-get install -y ninja-build clang-21 gcc-13 g++-13 python3
          sudo apt-get install -y clang-format-${LLVM_MAJOR}

          echo "CLANG_FORMAT=clang-format-${LLVM_MAJOR}" >> $GITHUB_ENV

      - name: Install lit
        run: pip install lit

      - name: Install Python requirements
        run: pip install -r python/requirements.txt

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLLVM_ENABLE_ASSERTIONS=ON \
            -DCMAKE_C_COMPILER=${{ matrix.config.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cxx }} \
            -DMLIR_DIR=${{ env.MLIR_DIR }} \
            -DCLANG_FORMAT=${{ env.CLANG_FORMAT }} \
            -DLLVM_EXTERNAL_LIT=$(which lit) \
            -DDataflowScheduler_ENABLE_PYTHON_BINDINGS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: cmake --build build --target check-dataflow-scheduler check-dataflow-scheduler-format
